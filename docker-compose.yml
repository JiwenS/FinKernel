services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finkernel-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-finkernel}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-finkernel}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: finkernel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finkernel}
      POSTGRES_USER: ${POSTGRES_USER:-finkernel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
